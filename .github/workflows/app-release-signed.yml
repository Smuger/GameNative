name: Build Test APK

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'keyvalues/**'
      - 'media/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Inject dummy credentials
        run: |
          cat <<EOF > local.properties
          POSTHOG_API_KEY=dummy
          POSTHOG_HOST=https://us.i.posthog.com
          STEAMGRIDDB_API_KEY=dummy
          SUPABASE_URL=https://dummy.supabase.co
          SUPABASE_KEY=dummy
          EOF

      - name: Install Android SDK Build Tools
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          fi
          yes | "$SDKMANAGER" --install "build-tools;34.0.0"

      - name: Build AAB
        run: ./gradlew :app:bundleDebug

      - name: Extract universal APK from bundle
        run: |
          java -jar tools/bundletool-all-1.17.2.jar build-apks \
            --bundle=app/build/outputs/bundle/debug/app-debug.aab \
            --output=app-debug.apks \
            --mode=universal

          unzip -o app-debug.apks universal.apk

      - name: Sign with debug keystore
        run: |
          BUILD_TOOLS_DIR="${ANDROID_HOME}/build-tools/34.0.0"
          if [ ! -d "$BUILD_TOOLS_DIR" ]; then
            BUILD_TOOLS_DIR="${ANDROID_SDK_ROOT}/build-tools/34.0.0"
          fi

          DEBUGKS="$HOME/.android/debug.keystore"
          if [ ! -f "$DEBUGKS" ]; then
            mkdir -p "$HOME/.android"
            keytool -genkey -v -keystore "$DEBUGKS" -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" \
              -storepass android -keypass android -noprompt
          fi

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          "${BUILD_TOOLS_DIR}/apksigner" sign \
            --ks "$DEBUGKS" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out gamenative-test-${SHORT_SHA}.apk \
            universal.apk

          echo "APK_NAME=gamenative-test-${SHORT_SHA}.apk" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          tag_name: test-${{ github.run_number }}
          name: "Test build #${{ github.run_number }} (${{ github.ref_name }})"
          body: "Automated test build from branch `${{ github.ref_name }}` @ `${{ github.sha }}`"
          prerelease: true
          files: ${{ env.APK_NAME }}