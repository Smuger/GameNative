name: Build Test APK

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'keyvalues/**'
      - 'media/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Inject dummy credentials
        run: |
          cat <<EOF > local.properties
          POSTHOG_API_KEY=dummy
          POSTHOG_HOST=https://us.i.posthog.com
          STEAMGRIDDB_API_KEY=dummy
          SUPABASE_URL=https://dummy.supabase.co
          SUPABASE_KEY=dummy
          EOF

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Rename APK
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          mv app/build/outputs/apk/debug/app-debug.apk gamenative-test-${SHORT_SHA}.apk
          echo "APK_NAME=gamenative-test-${SHORT_SHA}.apk" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          tag_name: test-${{ github.run_number }}
          name: "Test build #${{ github.run_number }} (${{ github.ref_name }})"
          body: "Automated test build from branch `${{ github.ref_name }}` @ `${{ github.sha }}`"
          prerelease: true
          files: ${{ env.APK_NAME }}
