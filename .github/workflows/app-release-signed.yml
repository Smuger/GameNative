name: Android CI

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'keyvalues/**'
      - 'media/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@v4
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Inject credentials
      run: |
        cat <<EOF > local.properties
        POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}
        POSTHOG_HOST=${{ secrets.POSTHOG_HOST }}
        STEAMGRIDDB_API_KEY=${{ secrets.STEAMGRIDDB_API_KEY }}
        EOF

    - name: Build APK
      run: ./gradlew :app:assembleRelease

    - name: Verify APK is signed
      run: |
        APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
        echo "APK path: $APK"
        ls -lh "$APK"
        $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner verify --print-certs "$APK"
        echo "apk_path=$APK" >> "$GITHUB_ENV"

    - name: Upload Artifact
      id: upload_app
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed
        path: ${{ env.apk_path }}

    - name: Build changelog text
      id: changelog
      run: |
        if jq -e '.commits' "$GITHUB_EVENT_PATH" > /dev/null 2>&1; then
          text=$(jq -r '.commits[] | "• " + (.message | split("\n")[0]) + " (" + .id[0:7] + ")"' "$GITHUB_EVENT_PATH")
        else
          text="• Manual build (workflow_dispatch)"
        fi
        echo 'log<<EOF' >>"$GITHUB_OUTPUT"
        echo "$text" >>"$GITHUB_OUTPUT"
        echo 'EOF' >>"$GITHUB_OUTPUT"

    - name: Create tag name
      id: tag
      run: echo "name=build-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.name }}
        name: "Build ${{ steps.tag.outputs.name }}"
        prerelease: true
        body: ${{ steps.changelog.outputs.log }}
        files: ${{ env.apk_path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
